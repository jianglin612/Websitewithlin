<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // Save the path as a query param on / so index.html can restore it
      var path = location.pathname;
      if (path && path !== '/') {
        location.replace('/?r=' + encodeURIComponent(path));
      }
    </script>
  </head>
  <body></body>
</html>
